<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM JS 17</title>
    <script src="main.js"></script>
</head>
<body>
    <!--Завдання 1-->
    <div class="converter">
        <h1>Конвертер валют</h1>
        <input class="amount" type="number" placeholder="Введіть суму">
        <select class="fromCurrency">
            <option value="usd">Долар</option>
            <option value="uah">Гривня</option>
            <option value="eur">Євро</option>
        </select>
        <select class="toCurrency">
            <option value="uah">Гривня</option>
            <option value="usd">Долар</option>
            <option value="eur">Євро</option>
        </select>
         <button class="convertBtn">Конвертувати</button>
         <div class="result"></div>
    </div>
    <br>
    <br>
    <br>
    <!--Завдання 2-->
    <div class="box">
        <h2>Список задач</h2>
        <input class="task" type="text" placeholder="Введіть задачу для виконання">
        <button class="addBtn">Додати задачу</button>
        <ul class="taskUl"></ul>
    </div>
</body>
</html>
