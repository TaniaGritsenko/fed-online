<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM JS 21</title>
    <script src="main.js"></script>
</head>
<body>
    <h2>sessinStorage</h2>
    <input type="text" id="textInput" placeholder="Введіть текст">
    <button id="saveSessionBtn">Зберегти</button>
    <button id="showSessionBtn">Показати</button>
    <p id="resultText"></p>
    <br>
    <br>
    <h2>Налаштування сторінки</h2>
    <label for="bgColor">Оберіть колір</label>
    <select id="bgColor">
        <option value="red">Червоний</option>
         <option value="green">Зелений</option>
          <option value="pink">Рожевий</option>
    </select>
    <button id="saveSettingsBtn">Зберегти</button>
    <br>
    <br>
    <h2>to-do-list</h2>
    <input type="text" id="taskInput" placeholder="Введіть значення">
    <button class="add">Додати</button>
    <ul></ul>
    <br>
    <br>
    <h2>JSON файл</h2>
    <button id="dowBtn">Завантажити JSON</button>
</body>
</html>
